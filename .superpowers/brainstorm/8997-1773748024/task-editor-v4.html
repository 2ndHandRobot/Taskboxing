<h2>Task Editor — Expand Button</h2>
<p class="subtitle">Two-corner expand icon: bottom-left and top-right arrowheads</p>

<div class="mockup">
  <div class="mockup-header">Inline expanded task</div>
  <div class="mockup-body" style="padding:10px;display:flex;flex-direction:column;gap:4px;background:#f1f5f9;font-size:11px">
    <div style="background:white;border:1px solid #e2e8f0;border-right:4px solid #94a3b8;border-radius:6px;padding:7px 10px;opacity:0.4">
      <div style="display:flex;align-items:center;gap:6px"><span style="color:#94a3b8">☐</span><span>Design homepage mockup</span></div>
    </div>

    <div style="background:white;border:1px solid #3b82f6;border-right:4px solid #ef4444;border-radius:6px;padding:8px 10px;box-shadow:0 2px 8px rgba(59,130,246,0.1)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="color:#94a3b8">☐</span>
        <span style="flex:1;font-size:11px;font-weight:500;color:#1e293b">Review pull requests</span>
        <!-- Two-corner expand: bottom-left ↙ and top-right ↗ -->
        <button style="width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;cursor:pointer;padding:0;flex-shrink:0" title="Open full editor">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- top-right corner: arrow pointing up-right -->
            <path d="M7 1H10V4" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10 1L6.5 4.5" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
            <!-- bottom-left corner: arrow pointing down-left -->
            <path d="M4 10H1V7" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M1 10L4.5 6.5" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div style="display:flex;gap:4px;padding-left:18px;flex-wrap:wrap;margin-bottom:6px">
        <span style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:9px;color:#374151">📅 Mar 18</span>
        <span style="background:#fee2e2;border-radius:4px;padding:2px 6px;font-size:9px;color:#991b1b">High ▾</span>
        <span style="background:#fee2e2;border-radius:4px;padding:2px 6px;font-size:9px;color:#991b1b">urgent</span>
        <span style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:4px;padding:2px 6px;font-size:9px;color:#94a3b8">+ tag</span>
      </div>
      <div style="display:flex;gap:4px;padding-left:18px">
        <button style="flex:1;background:#f3f4f6;border:none;border-radius:4px;padding:4px;font-size:9px;color:#374151;cursor:pointer">Cancel</button>
        <button style="flex:1;background:#3b82f6;border:none;border-radius:4px;padding:4px;font-size:9px;color:white;cursor:pointer">Save</button>
      </div>
    </div>

    <div style="background:white;border:1px solid #e2e8f0;border-right:4px solid #a855f7;border-radius:6px;padding:7px 10px;opacity:0.4">
      <div style="display:flex;align-items:center;gap:6px"><span style="color:#94a3b8">☐</span><span>Book dentist appointment</span></div>
    </div>
  </div>
</div>
